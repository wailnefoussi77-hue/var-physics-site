<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>VAR & Physique</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
}

header{
background:black;
padding:30px;
text-align:center;
}

nav a{
margin:20px;
color:#38bdf8;
text-decoration:none;
font-size:18px;
}

.hero{
text-align:center;
padding:80px;
}

.stats{
display:flex;
justify-content:center;
gap:60px;
margin-top:40px;
}

.stat{
font-size:30px;
}

section{
padding:60px;
}

canvas{
background:#15803d;
border:4px solid white;
display:block;
margin:auto;
}

button{
padding:10px 20px;
margin:20px;
font-size:16px;
}

</style>

</head>

<body>

<header>

<h1>VAR & Physique</h1>

<p>Quand la physique arbitre le football</p>

<nav>

<a href="#simulateur">Simulation</a>
<a href="#physique">Physique</a>
<a href="#cameras">Caméras</a>

</nav>

</header>

<div class="hero">

<h2>Mesures Physiques dans le Football Moderne</h2>

<div class="stats">

<div class="stat">
8+ <br>Caméras VAR
</div>

<div class="stat">
500 fps <br>Haute vitesse
</div>

<div class="stat">
±1.1 cm <br>Précision SAOT
</div>

<div class="stat">
29 <br>Points anatomiques
</div>

</div>

</div>

<section id="simulateur">

<h2 style="text-align:center">Simulateur de Hors-Jeu</h2>

<canvas id="terrain" width="900" height="400"></canvas>

<div style="text-align:center">

<button onclick="reset()">Reset</button>
<button onclick="random()">Random</button>

</div>

<h3 id="result" style="text-align:center"></h3>

</section>

<script>

const canvas = document.getElementById("terrain")
const ctx = canvas.getContext("2d")

let players = [
{x:250,y:200,type:"def"},
{x:350,y:200,type:"def"},
{x:600,y:200,type:"att"}
]

function draw(){

ctx.clearRect(0,0,900,400)

players.forEach(p=>{

ctx.beginPath()

ctx.fillStyle = p.type==="att" ? "red" : "blue"

ctx.arc(p.x,p.y,12,0,Math.PI*2)

ctx.fill()

})

let line = Math.min(players[0].x,players[1].x)

ctx.beginPath()
ctx.strokeStyle="yellow"
ctx.moveTo(line,0)
ctx.lineTo(line,400)
ctx.stroke()

let attacker = players[2]

let result=document.getElementById("result")

if(attacker.x < line)
result.innerHTML="✔ En jeu"
else
result.innerHTML="❌ Hors-jeu"

}

function reset(){

players[0].x=250
players[1].x=350
players[2].x=600

draw()

}

function random(){

players.forEach(p=>{
p.x=100+Math.random()*700
})

draw()

}

draw()

</script>

</body>
</html>
